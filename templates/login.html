{% extends "base.html" %}

{% block content %}
  <section class="pageHead">
    <div>
      <h1 class="pageHead__title">Login</h1>
      <p class="pageHead__subtitle">Welcome back. Sign in to manage listings and reservations.</p>
    </div>
  </section>

  <section class="card authCard">
    <form method="post" action="{{ url_for('login_post') }}" class="form">
      <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}" />
      <div class="field">
        <label class="label" for="email">Email</label>
        <input class="input" id="email" name="email" type="email" autocomplete="email" required />
      </div>

      <div class="field">
        <label class="label" for="password">Password</label>
        <input class="input" id="password" name="password" type="password" autocomplete="current-password" required />
      </div>

      <div class="form__actions">
        <button class="btn btn--primary" type="submit">Login</button>
        <a class="btn btn--ghost" href="{{ url_for('signup') }}">Create account</a>
      </div>
    </form>
  </section>
{% endblock %}
