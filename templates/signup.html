{% extends "base.html" %}

{% block content %}
  <section class="pageHead">
    <div>
      <h1 class="pageHead__title">Sign up</h1>
      <p class="pageHead__subtitle">Create an account to post listings or reserve pickups.</p>
    </div>
  </section>

  <section class="card authCard">
    <form method="post" action="{{ url_for('signup_post') }}" class="form">
      <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}" />
      <div class="grid grid--2">
        <div class="field">
          <label class="label" for="name">Name</label>
          <input class="input" id="name" name="name" autocomplete="name" required />
        </div>
        <div class="field">
          <label class="label" for="role">Role</label>
          <select class="select" id="role" name="role">
            <option value="buyer">Buyer</option>
            <option value="seller">Seller</option>
          </select>
        </div>
      </div>

      <div class="field">
        <label class="label" for="email">Email</label>
        <input class="input" id="email" name="email" type="email" autocomplete="email" required />
      </div>

      <div class="field">
        <label class="label" for="password">Password</label>
        <input class="input" id="password" name="password" type="password" autocomplete="new-password" minlength="6" required />
        <div class="hint">At least 6 characters.</div>
      </div>

      <div class="form__actions">
        <button class="btn btn--primary" type="submit">Create account</button>
        <a class="btn btn--ghost" href="{{ url_for('login') }}">I already have an account</a>
      </div>
    </form>
  </section>
{% endblock %}
